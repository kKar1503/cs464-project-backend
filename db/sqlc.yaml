version: "2"
sql:
  - engine: "mysql"
    queries: "queries/"
    schema: "migrations/"
    gen:
      go:
        package: "db"
        out: "sqlc"
        sql_package: "database/sql"
        emit_json_tags: true
        emit_interface: true
        emit_empty_slices: true
        emit_pointers_for_null_types: true
